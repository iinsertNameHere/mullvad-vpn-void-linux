name: Build and Publish XBPS Repository

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write


jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git \
            curl \
            xz-utils \
            bash


      - name: Install static XBPS
        run: |
          curl -L \
            https://repo-default.voidlinux.org/static/xbps-static-latest.x86_64-musl.tar.xz \
            -o xbps-static.tar.xz

          mkdir -p "$HOME/xbps"

          tar xf xbps-static.tar.xz \
            -C "$HOME/xbps"

          echo "$HOME/xbps/usr/bin" >> "$GITHUB_PATH"

      - name: Setup xbps-uchroot
        run: |
          sudo apt update
          sudo apt install -y libarchive-tools

          sudo mkdir -p /usr/libexec

          sudo groupadd -f xbuilder

          sudo chown root:xbuilder "$HOME/xbps/usr/bin/xbps-uchroot"
          sudo chmod 4750 "$HOME/xbps/usr/bin/xbps-uchroot"

          sudo usermod -aG xbuilder "$USER"

      - name: Clone void-packages
        run: |
          git clone --depth=1 \
            https://github.com/void-linux/void-packages.git

          test -f void-packages/xbps-src


      - name: Add package template
        run: |
          cp -r \
            srcpkgs/mullvad-vpn \
            void-packages/srcpkgs/


      - name: Configure xbps-src
        run: |
          cd void-packages

          mkdir -p etc

          echo "XBPS_ALLOW_RESTRICTED=yes" >> etc/conf


      - name: Bootstrap and build package
        run: |
          newgrp xbuilder <<EOF
          cd void-packages

          ./xbps-src binary-bootstrap

          ./xbps-src pkg mullvad-vpn
          EOF


      - name: Create repository
        run: |
          mkdir -p repo

          find void-packages/hostdir/binpkgs \
            -name "*.xbps" \
            -exec cp {} repo/ \;

          touch repo/.nojekyll

          xbps-rindex \
            -a \
            repo/*.xbps


      - name: Sign repository
        env:
          XBPS_PRIVATE_KEY: ${{ secrets.XBPS_PRIVATE_KEY }}

        run: |
          echo "$XBPS_PRIVATE_KEY" > private.pem

          xbps-rindex \
            --privkey private.pem \
            --sign \
            --signedby "iinsert <iinsertt@proton.me>" \
            repo/


      - name: Sign packages
        env:
          XBPS_PRIVATE_KEY: ${{ secrets.XBPS_PRIVATE_KEY }}

        run: |
          echo "$XBPS_PRIVATE_KEY" > private.pem

          xbps-rindex \
            --privkey private.pem \
            --sign-pkg \
            repo/*.xbps

          rm -f private.pem


      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: repo/


  deploy:
    needs: build

    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
